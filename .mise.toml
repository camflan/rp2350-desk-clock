[env]
PICO_SDK_PATH = "{{env.HOME}}/src/github.com/raspberrypi/pico-sdk"
PICO_TOOLCHAIN_PATH = "/Applications/ArmGNUToolchain"

[tools]
cmake = "latest"

[tools."github:raspberrypi/pico-sdk-tools"]
version = "2.1.1-3"
version_prefix = "v"
asset_pattern = "picotool-*-mac.zip"
bin_path = "picotool"

[tasks.setup]
description = "Clone pico-sdk and install ARM toolchain"
run = """
#!/usr/bin/env bash
set -euo pipefail

SDK_DIR="$HOME/src/github.com/raspberrypi/pico-sdk"

# Clone pico-sdk if not present
if [ -d "$SDK_DIR" ]; then
  echo "✓ pico-sdk already present at $SDK_DIR"
else
  echo "Cloning pico-sdk to $SDK_DIR…"
  mkdir -p "$(dirname "$SDK_DIR")"
  git clone --recursive https://github.com/raspberrypi/pico-sdk.git "$SDK_DIR"
  echo "✓ pico-sdk cloned"
fi

# Install ARM toolchain via Homebrew
if command -v brew &>/dev/null; then
  if brew list --cask gcc-arm-embedded &>/dev/null; then
    echo "✓ gcc-arm-embedded already installed"
  else
    echo "Installing gcc-arm-embedded via Homebrew…"
    brew install --cask gcc-arm-embedded
    echo "✓ gcc-arm-embedded installed"
  fi
else
  echo "ERROR: Homebrew not found. Install it from https://brew.sh then re-run this task."
  echo "Alternatively, download the ARM GNU Toolchain manually from:"
  echo "  https://developer.arm.com/Tools%20and%20Software/GNU%20Toolchain"
  echo "and install it to /Applications/ArmGNUToolchain/"
  exit 1
fi
"""

[tasks.build]
description = "Configure and build the project"
run = "cmake -B build && cmake --build build"

[tasks.clean]
description = "Remove build directory"
run = "rm -rf build"

[tasks.flash]
description = "Flash firmware to device via picotool (device must be connected)"
run = """
#!/usr/bin/env bash
set -eo pipefail

FIRMWARE="build/desk_clock.uf2"

if [ ! -f "$FIRMWARE" ]; then
  echo "ERROR: $FIRMWARE not found. Run 'mise run build' first."
  exit 1
fi

echo "Flashing $FIRMWARE…"
picotool load -f "$FIRMWARE"
picotool reboot
echo "✓ Flashed and rebooted"
"""

[tasks.serial]
description = "Open serial monitor at 115200 baud"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Find the USB modem device
DEV=$(ls /dev/tty.usbmodem* 2>/dev/null | head -1)

if [ -z "$DEV" ]; then
  echo "ERROR: No /dev/tty.usbmodem* device found."
  echo "Make sure the board is connected and has booted (not in BOOTSEL mode)."
  exit 1
fi

echo "Connecting to $DEV at 115200 baud… (Ctrl-A then Ctrl-\\ to quit)"
screen "$DEV" 115200
"""

[tasks.dev]
description = "Build, flash, and open serial monitor"
depends = ["build", "flash", "serial"]
